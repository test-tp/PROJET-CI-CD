name: 02 - Publish to GHCR

on:
  workflow_run:
    workflows: ["01 - CI Build & Test"]
    types:
      - completed

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/nginx-web
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and Push to GHCR
        id: push-step
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ id.meta.outputs.tags }}

      - name: Output Digest Info
        run: |
          echo "Image Digest: ${{ steps.push-step.outputs.digest }}"
